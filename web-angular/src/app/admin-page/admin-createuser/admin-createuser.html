<section>
    <h1>Crear nuevo usuario</h1>
    <h5 class="text-secondary">Interfaz para crear un usuario en la base de datos</h5>
    <div class="w-100 p-3">
        <form class="d-flex">
            <div class="w-50">
                <h5 class="text-secondary w-fit">Datos de la persona</h5>
                <div class="form-group row g-2">
                    <label class="col-8">Nombre y apellidos</label>
                    <label class="col-4 text-center">Foto de Perfil</label>
                    <div class="col-8 ">
                        <div class="row g-2">
                            <input [(ngModel)]="nombre" name="usuario" class="form-control" type="text" placeholder="Nombre">
                            <input [(ngModel)]="apellido1" name="usuario" class="form-control" type="text" placeholder="Apellido 1">
                            <input [(ngModel)]="apellido2" name="usuario" class="form-control" type="text" placeholder="Apellido 2">
                        </div>
                    </div>
                    <div class="col-4 p-3 d-flex align-items-center">
                        <figure class="user-pfp m-0 user-avatar-edit">
                            <img src="/img/pfp_default.jpg" alt="">

                            <span class="edit-icon">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
                                </svg>
                            </span>
                        </figure>
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <div class="form-group flex-grow-1">
                        <label>Contraseña</label>
                        <input [(ngModel)]="password" name="password" class="form-control" type="password"
                            placeholder="contraseña">
                    </div>
                    <div class="form-group flex-grow-1">
                        <label>Confirmar contraseña</label>
                        <input [(ngModel)]="password2" name="password" class="form-control" type="password"
                            placeholder="contraseña">
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <div class="form-group flex-grow-1">
                        <label>Teléfono</label>
                        <input [(ngModel)]="tel" name="tel" class="form-control" type="tel"
                            placeholder="+34 600 000 000">
                    </div>
                    <div class="form-group flex-grow-1">
                        <label>Correo</label>
                        <input [(ngModel)]="mail" name="mail" class="form-control" type="email"
                            placeholder="ejemplo@compañia.com">
                    </div>
                </div>

            </div>
            <section class="vr mx-5"></section>
            <div class="w-50">
                <h5 class="text-secondary">Informacion de trabajo</h5>
                <div class="form-group">
                    <label>Rol del usuario</label>
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button"
                            data-bs-toggle="dropdown">{{chosenRol.display}}</button>
                        <div class="dropdown-menu">
                            @for (rol of roles; track rol){
                            <button class="dropdown-item" (click)="setRol(rol[0], rol[1])">{{rol[1]}}</button>
                            }
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Carnet de conducir</label>
                    <div class="card w-fit">
                        <div class="card-body">
                            @for (letra of carnetLetras; track letra) {
                            <div class="mb-1 form-check form-switch">
                                <input class="form-check-input" type="checkbox" [checked]="chosenCarnet[letra]"
                                    (change)="setCarnet(letra)" />
                                <label class="ms-3">{{ letra }}</label>
                            </div>
                            }
                        </div>
                    </div>
                </div>
            </div>
        </form>
        @if(error()){
        <p class="text-danger font-weight-bold">{{error()}}</p>
        }
        @if(success()){
        <p class="text-success font-weight-bold">{{success()}}</p>
        }
        <div class="mt-2 d-flex gap-3">
            <button type="button" class="btn btn-primary" (click)="createNewUser()">Crear usuario</button>
            <button type="button" class="btn btn-outline-secondary" routerLink="/admin/usuarios">Cancelar</button>
        </div>
    </div>

</section>
