<section class="login-page d-flex justify-content-center">

  <!-- LADO IZQUIERDO -->
  <div class="d-none d-xl-block flex-grow-1 login-left">

    <section class="login-left-content">
      <h1><span class="highlight">COORDINA</span> A TUS OPERADORES, ASIGNA SERVICIOS Y
        <span class="highlight">MONITORIZA</span> CADA VEHÍCULO EN TIEMPO
        <span class="highlight"> REAL</span>.
      </h1>
    </section>
  </div>

  <!-- LADO DERECHO -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-header mb-5">
        <h2 class="mb-2">ADMINISTRADOR</h2>
        <h1 class="mb-5">INICIAR SESIÓN</h1>
        <p>Accede a tu panel de control</p>
      </div>

      @if (error() != "") {
      <div class="error-msg">
        Usuario o contraseña incorrectos.
      </div>
      }

      <form #loginForm="ngForm" (ngSubmit)="login()">

        <div class="form-group">
          <label for="loginInputUsername">Correo electrónico</label>
          <input [(ngModel)]="email" name="email" class="custom-input" type="text" placeholder="usuario@towapp.com"
            required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="loginInputPassword">Contraseña</label>
          <div class="password-wrap">
            <input [(ngModel)]="password" name="password" class="custom-input" type="password" placeholder="••••••••"
              required autocomplete="current-password">
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe">
            <span>Recordarme</span>
          </label>

          <!-- <a routerLink="/recuperar-password" class="forgot-link">
            ¿Olvidaste tu contraseña?
          </a> -->
        </div>

        <button type="submit" class="btn-login" [disabled]="validatingLogin()">
          @if (!validatingLogin()) {
          <span>ENTRAR</span>
          }
          @else {
          <span>VALIDANDO...</span>
          }
        </button>
      </form>

      <div class="divider">
        <span>○</span>
      </div>

      <div class="login-help">
        <p>¿No tienes cuenta? <a href="mailto:info@towapp.es">Contacta con tu empresa</a></p>
      </div>

    </div>
  </div>
</section>
