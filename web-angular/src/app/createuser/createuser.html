<section>
    <h2 class="subtitulo">Crear nuevo usuario</h2>

    <section class="textBox">
        <p class="texto">Usuario</p>
        <input [(ngModel)]="username" type="text" placeholder="Usuario" class="inputText">
        <br>
        <p class="texto">Contraseña</p>
        <input [(ngModel)]="password" type="password" placeholder="Contraseña" class="inputText">
        <br>
        @if (error) {
        <p class="texto">No se pudo crear el usuario</p>
        }
        <button class="miniBoton" (click)="createUser()">Crear Usuario</button>
    </section>
</section>
