<section class="login-page d-flex justify-content-center">

  <!-- LADO IZQUIERDO -->
  <div class="d-none d-xl-block flex-grow-1 login-left">

    <section class="login-left-content">
      <h1><span class="highlight">COORDINA</span> A TUS OPERADORES, ASIGNA SERVICIOS Y
        <span class="highlight">MONITORIZA</span> CADA VEHÍCULO EN TIEMPO
        <span class="highlight"> REAL</span>.
      </h1>
    </section>
  </div>

  <!-- LADO DERECHO -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-header mb-5">
        <h2 class="mb-2">ADMINISTRADOR</h2>
        <h1 class="mb-5">INICIAR SESIÓN</h1>
        <p>Accede a tu panel de control</p>
      </div>

      @if (error() != "") {
      <div class="error-msg">
        Usuario o contraseña incorrectos.
      </div>
      }

      <form #loginForm="ngForm" (ngSubmit)="login()">

        <div class="form-group">
          <label for="loginInputUsername">Correo electrónico</label>
          <input [(ngModel)]="email" name="email" class="custom-input" type="text" placeholder="usuario@towapp.com"
            required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="loginInputPassword">Contraseña</label>
          <div class="d-flex gap-3">
            <div class="password-wrap flex-grow-1">
              <input [(ngModel)]="password" name="password" title="Mostrar contraseña" class="custom-input" type="{{mostrarPassword() ? 'text' : 'password'}}" placeholder="••••••••">
            </div>
            <button class="btn btn-outline-light px-4" (click)="mostrarPassword.update(v => !v)" type="button">
              <svg width="16px" height="16px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path
                      d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
                  <path
                      d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
              </svg>
          </button>
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe">
            <span>Recordarme</span>
          </label>

          <!-- <a routerLink="/recuperar-password" class="forgot-link">
            ¿Olvidaste tu contraseña?
          </a> -->
        </div>

        <button type="submit" class="btn-login" [disabled]="validatingLogin()">
          @if (!validatingLogin()) {
          <span>ENTRAR</span>
          }
          @else {
          <span>VALIDANDO...</span>
          }
        </button>
      </form>

      <div class="divider">
        <span>○</span>
      </div>

      <div class="login-help">
        <p>¿No tienes cuenta? <a href="mailto:info@towapp.es">Contacta con tu empresa</a></p>
      </div>

    </div>
  </div>
</section>
