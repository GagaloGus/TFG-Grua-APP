<div class="background d-flex container-fluid p-0 min-vh-100">
    <!-- Sidebar -->
    <section class="d-none d-md-flex sidebar flex-column bg-dark text-white p-4 rounded-end-4">
        <div class="d-flex flex-column align-items-start w-100">
            <h3 class="fw-bold text-center w-100 mb-4">Panel de Administrador</h3>

            <button class="nav-button btn btn-outline-light w-100 mt-3 gap-2" routerLink="/admin/dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </button>

            <button class="nav-button btn btn-outline-light w-100 mt-3 gap-2" routerLink="/admin/servicios">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                </svg>
                Servicios
            </button>

            <button class="nav-button btn btn-outline-light w-100 mt-3 gap-2" routerLink="/admin/users">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Usuarios
            </button>

            <button class="nav-button btn btn-outline-light w-100 mt-3 gap-2" routerLink="/admin">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                    <path d="M15 18H9"></path>
                    <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14">
                    </path>
                    <circle cx="17" cy="18" r="2"></circle>
                    <circle cx="7" cy="18" r="2"></circle>
                </svg>
                Vehículos
            </button>
        </div>

        <div class="text-start mt-auto">
            <hr>
            <p class="m-0 text-white-50">Sesión iniciada:</p>
            <p class="fw-bold fs-5">{{ getEmail() ?? '—'}}</p>
            <button (click)="logout()" class="w-100 d-flex gap-3 align-items-center btn btn-outline-danger mt-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
                Cerrar Sesión
            </button>
        </div>
    </section>

    <section class="content flex-grow-1 p-4">
        <div class="bg-light h-100 p-4 rounded-3">
            <router-outlet></router-outlet>
        </div>
    </section>
</div>
